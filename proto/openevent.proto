syntax = "proto3";

package openevent;

option java_package = "io.openevent";
option go_package = "openevent/proto;openevent";

// ============================================================================
// 公共枚举
// ============================================================================

enum Visibility {
    VISIBILITY_PUBLIC = 0;
    VISIBILITY_PROTECTED = 1;
    VISIBILITY_PRIVATE = 2;
}

enum ChannelFilter {
    CHANNEL_FILTER_ALL = 0;
    CHANNEL_FILTER_JOINED = 1;
    CHANNEL_FILTER_OWNED = 2;
}

// ============================================================================
// 公共消息类型
// ============================================================================

message Message {
    uint64 seq = 1;               // 全局严格连续编号，从 1 开始
    uint64 ts_ms = 2;             // 服务端收到写入请求的 Unix 毫秒时间戳
    uint64 channel_id = 3;
    uint64 principal = 4;         // 发送者
    repeated uint64 recipients = 5;  // 接收方 principal 列表
    bytes payload = 6;
}

message ChannelInfo {
    uint64 channel_id = 1;
    string name = 2;
    Visibility visibility = 3;
    string protocol = 4;          // 协议约定标签，服务端不校验
    string description = 5;
    optional uint64 creator = 6;  // 创建者 principal；系统频道不设置
    repeated uint64 members = 7;  // 成员 principal 列表；系统频道为空
}

// ============================================================================
// EventService — 消息发布、拉取、订阅
// ============================================================================

service EventService {
    rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
    rpc Publish(PublishRequest) returns (PublishResponse);
    rpc PublishAutoSeq(PublishAutoSeqRequest) returns (PublishAutoSeqResponse);
    rpc Fetch(FetchRequest) returns (FetchResponse);
    rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse);
}

message GetStatusRequest {
    uint64 principal = 1;
    string token = 2;
}

message GetStatusResponse {
    uint64 min_seq = 1;           // 当前最小可用 seq；全量保留模式下有消息时固定为 1
    uint64 max_seq = 2;           // 当前最大 seq，无消息时为 0
}

message PublishRequest {
    uint64 principal = 1;
    string token = 2;
    uint64 channel_id = 3;
    uint64 seq = 4;               // 期望的 seq，须严格等于当前 max_seq + 1
    repeated uint64 recipients = 6;  // 接收方 principal 列表
    bytes payload = 5;
}

message PublishResponse {
}

message PublishAutoSeqRequest {
    uint64 principal = 1;
    string token = 2;
    uint64 channel_id = 3;
    repeated uint64 recipients = 5;  // 接收方 principal 列表
    bytes payload = 4;
}

message PublishAutoSeqResponse {
    uint64 seq = 1;               // 服务端分配并确认写入的 seq
}

message FetchRequest {
    uint64 principal = 1;
    string token = 2;
    uint64 from_seq = 3;          // 起始 seq（含），0 = 从当前 max_seq 之后开始
    uint32 limit = 4;             // 最大返回可见消息条数，必填，范围 1~1000
    bool only_my_recipient = 5;   // 为 true 时仅返回 recipients 包含 principal 的消息
}

message FetchResponse {
    repeated Message messages = 1;
    bool has_more = 2;
    uint64 next_seq = 3;
}

message SubscribeRequest {
    uint64 principal = 1;
    string token = 2;
    uint64 from_seq = 3;          // 起始 seq，0 = 从当前 max_seq 之后开始
    bool only_my_recipient = 4;   // 为 true 时仅推送 recipients 包含 principal 的消息
}

message SubscribeResponse {
    oneof result {
        Message message = 1;      // 正常订阅推送的消息
        uint64 next_seq = 2;      // from_seq > max_seq 时返回建议下一次起点并结束 stream
    }
}

// ============================================================================
// ChannelService — 通道管理
// ============================================================================

service ChannelService {
    rpc CreateChannel(CreateChannelRequest) returns (CreateChannelResponse);
    rpc GetChannel(GetChannelRequest) returns (GetChannelResponse);
    rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse);
    rpc AddMember(AddMemberRequest) returns (AddMemberResponse);
    rpc RemoveMember(RemoveMemberRequest) returns (RemoveMemberResponse);
}

service AdminService {
    // AdminService 运行在独立管理端口，当前不做额外鉴权。
    rpc AddToken(AddTokenRequest) returns (AddTokenResponse);
    rpc DeleteToken(DeleteTokenRequest) returns (DeleteTokenResponse);
    rpc ListTokens(ListTokensRequest) returns (ListTokensResponse);
}

message CreateChannelRequest {
    uint64 principal = 1;
    string token = 2;
    string name = 3;
    Visibility visibility = 4;    // 未设置时 proto3 默认 VISIBILITY_PUBLIC
    string protocol = 5;          // 协议约定标签（可选）
    string description = 6;
    repeated uint64 members = 7;  // 成员 principal 列表
}

message CreateChannelResponse {
    ChannelInfo channel = 1;
}

message GetChannelRequest {
    uint64 principal = 1;
    string token = 2;
    uint64 channel_id = 3;
}

message GetChannelResponse {
    ChannelInfo channel = 1;
}

message ListChannelsRequest {
    uint64 principal = 1;
    string token = 2;
    ChannelFilter filter = 3;     // 未设置时 proto3 默认 CHANNEL_FILTER_ALL
}

message ListChannelsResponse {
    repeated ChannelInfo channels = 1;
}

message AddMemberRequest {
    uint64 principal = 1;         // 操作者（须为创建者）
    string token = 2;
    uint64 channel_id = 3;
    uint64 target_principal = 4;  // 被添加的成员
}

message AddMemberResponse {}

message RemoveMemberRequest {
    uint64 principal = 1;         // 操作者（须为创建者）
    string token = 2;
    uint64 channel_id = 3;
    uint64 target_principal = 4;  // 被移除的成员
}

message RemoveMemberResponse {}

message TokenBinding {
    string token = 1;
    uint64 principal = 2;
}

message AddTokenRequest {
    uint64 target_principal = 1;
}

message AddTokenResponse {
    TokenBinding binding = 1;
}

message DeleteTokenRequest {
    string target_token = 1;
}

message DeleteTokenResponse {}

message ListTokensRequest {}

message ListTokensResponse {
    repeated TokenBinding bindings = 1;
}
